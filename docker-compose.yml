services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    build: .
    command: celery -A vibing worker -l info
    env_file:
      - .env
    depends_on:
      - redis

volumes:
  media_data:
  static_data:
