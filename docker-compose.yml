services:
  web:
    # Em vez de build local, puxamos a imagem do GitHub Container Registry (GHCR)
    image: ghcr.io/andre-moniz-morais/vibing:latest
    restart: unless-stopped # Permite ao container reiniciar sozinho quando o MacMini liga
    ports:
      - "8002:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - ./workspaces:/app/workspaces
      
  celery:
    # A mesma imagem que a app principal (o container vai usar o "command:" para iniciar como worker)
    image: ghcr.io/andre-moniz-morais/vibing:latest
    restart: unless-stopped
    command: celery -A vibing worker -l info
    env_file:
      - .env
    depends_on:
      - redis
      - web

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data # Guarda as queues persistentes no servidor físico também

volumes:
  redis_data:

networks:
  default:
    name: docker_shared_network
    external: true